name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Create release package
      run: |
        mkdir -p release
        
        # 复制所有必要的文件
        $files = @(
            "appsettings.json", 
            "README.md", 
            "INSTALL.md", 
            "LICENSE", 
            "install.ps1",
            "Ezcel.sln"
        )
        
        foreach ($file in $files) {
            if (Test-Path $file) {
                Copy-Item -Path $file -Destination "release/"
                Write-Host "已复制 $file"
            } else {
                Write-Host "警告：$file 不存在"
            }
        }
        
        # 复制源代码目录
        if (Test-Path "src") {
            Copy-Item -Path "src" -Destination "release/" -Recurse
            Write-Host "已复制 src 目录"
        } else {
            Write-Host "警告：src 目录不存在"
        }
        
        # 复制测试目录
        if (Test-Path "tests") {
            Copy-Item -Path "tests" -Destination "release/" -Recurse
            Write-Host "已复制 tests 目录"
        } else {
            Write-Host "警告：tests 目录不存在"
        }
        
        # 列出发布目录内容
        Write-Host "发布目录内容:"
        Get-ChildItem -Path "release" -Recurse | Select-Object -Property FullName
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Ezcel-AddIn
        path: release/
        
    - name: Create ZIP archive
      run: |
        Compress-Archive -Path "release/*" -DestinationPath "Ezcel-v${{ github.ref_name }}.zip"
        
    - name: Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: Ezcel-v${{ github.ref_name }}.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}