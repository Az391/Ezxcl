name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
        
    - name: Restore dependencies
      run: dotnet restore Ezcel.sln
      
    - name: Build
      run: dotnet build Ezcel.sln --configuration Release --no-restore
      
    - name: Create release package
      run: |
        mkdir -p release
        # 检查构建输出目录是否存在
        if (Test-Path "src/Ezcel.AddIn/bin/Release/net9.0-windows") {
            Copy-Item -Path "src/Ezcel.AddIn/bin/Release/net9.0-windows/*" -Destination "release/" -Recurse
        } else {
            Write-Host "构建输出目录不存在，检查构建步骤"
            exit 1
        }
        
        # 复制配置和文档文件
        $files = @("appsettings.json", "README.md", "INSTALL.md", "LICENSE", "install.ps1")
        foreach ($file in $files) {
            if (Test-Path $file) {
                Copy-Item -Path $file -Destination "release/"
                Write-Host "已复制 $file"
            } else {
                Write-Host "警告：$file 不存在"
            }
        }
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Ezcel-AddIn
        path: release/
        
    - name: Create ZIP archive
      run: |
        Compress-Archive -Path "release/*" -DestinationPath "Ezcel-v${{ github.ref_name }}.zip"
        
    - name: Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: Ezcel-v${{ github.ref_name }}.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}